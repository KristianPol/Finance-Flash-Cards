<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Flashcards - BAnM3-2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --card-bg: #16213e;
            --card-back: #0f3460;
            --success: #00d9ff;
            --warning: #f39c12;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--highlight);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--success);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--highlight), var(--success));
            transition: width 0.5s ease;
            border-radius: 0 2px 2px 0;
        }

        .main-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .category-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--highlight);
            color: white;
            border-color: var(--highlight);
        }

        .card-container {
            width: 100%;
            max-width: 600px;
            height: 400px;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front {
            background: linear-gradient(145deg, var(--card-bg) 0%, var(--secondary) 100%);
        }

        .card-back {
            background: linear-gradient(145deg, var(--card-back) 0%, var(--accent) 100%);
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .card-back::-webkit-scrollbar {
            width: 6px;
        }

        .card-back::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .card-category {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--highlight);
            font-weight: 600;
        }

        .card-number {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .card-question {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            margin-top: 1rem;
        }

        .card-answer {
            font-size: 1.05rem;
            line-height: 1.6;
            text-align: left;
            width: 100%;
        }

        .card-answer ul {
            list-style: none;
            padding: 0;
        }

        .card-answer li {
            margin-bottom: 0.7rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .card-answer li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--highlight);
        }

        .card-answer table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .card-answer th, .card-answer td {
            padding: 0.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: left;
        }

        .card-answer th {
            background: rgba(255,255,255,0.1);
            font-weight: 600;
        }

        .flip-hint {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .flip-hint svg {
            width: 16px;
            height: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-nav {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        .btn-nav:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .btn-difficult {
            background: var(--highlight);
            color: white;
        }

        .btn-difficult:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .btn-easy {
            background: var(--success);
            color: var(--primary);
        }

        .btn-easy:hover {
            background: #80e8ff;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .keyboard-hints {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .kbd {
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .completion-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .completion-screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .completion-screen h2 {
            font-size: 2rem;
            color: var(--success);
        }

        .completion-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 500px;
        }

        .completion-stat {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .completion-stat .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--highlight);
        }

        .completion-stat .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .difficult-cards {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .star-btn {
            position: absolute;
            top: 1.5rem;
            right: 3.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
            z-index: 10;
        }

        .star-btn:hover {
            color: var(--warning);
        }

        .star-btn.marked {
            color: var(--warning);
        }

        @media (max-width: 600px) {
            .card-container {
                height: 350px;
            }
            .card-question {
                font-size: 1.3rem;
            }
            .card-answer {
                font-size: 0.95rem;
            }
            .header {
                flex-direction: column;
                gap: 1rem;
            }
            .completion-stats {
                grid-template-columns: 1fr;
            }
            .keyboard-hints {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Finance <span>Flashcards</span></h1>
        <div class="stats">
            <div class="stat">
                <span class="stat-value" id="current-card">1</span>
                <span class="stat-label">Current</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="total-cards">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="marked-count">0</span>
                <span class="stat-label">Marked</span>
            </div>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>

    <div class="main-container">
        <div class="category-filter" id="category-filter">
            <button class="filter-btn active" data-category="all">All</button>
        </div>

        <div class="card-container" id="card-container">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <span class="card-category" id="front-category">Category</span>
                    <span class="card-number" id="front-number">1/50</span>
                    <button class="star-btn" id="star-btn" title="Mark as difficult">★</button>
                    <div class="card-question" id="card-question">Question</div>
                    <div class="flip-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12l7-7 7 7"/>
                        </svg>
                        Click or Space to flip
                    </div>
                </div>
                <div class="card-face card-back">
                    <span class="card-category" id="back-category">Category</span>
                    <div class="card-answer" id="card-answer">Answer</div>
                </div>
            </div>
        </div>

        <div class="completion-screen" id="completion-screen">
            <h2>🎉 Session Complete!</h2>
            <div class="completion-stats">
                <div class="completion-stat">
                    <div class="value" id="completed-total">0</div>
                    <div class="label">Cards Reviewed</div>
                </div>
                <div class="completion-stat">
                    <div class="value" id="completed-marked">0</div>
                    <div class="label">Marked Difficult</div>
                </div>
                <div class="completion-stat">
                    <div class="value" id="completed-percent">0%</div>
                    <div class="label">Completion</div>
                </div>
            </div>
            <button class="btn btn-nav" id="restart-btn">Restart Session</button>
            <div class="difficult-cards" id="difficult-summary"></div>
        </div>

        <div class="controls" id="controls">
            <button class="btn btn-nav" id="prev-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Previous
            </button>
            <button class="btn btn-difficult" id="difficult-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                Mark Difficult
            </button>
            <button class="btn btn-easy" id="easy-btn">
                Next
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </div>

        <div class="keyboard-hints">
            <span><span class="kbd">Space</span> Flip</span>
            <span><span class="kbd">←</span> Prev</span>
            <span><span class="kbd">→</span> Next</span>
            <span><span class="kbd">M</span> Mark</span>
            <span><span class="kbd">1</span> Difficult</span>
            <span><span class="kbd">2</span> Easy</span>
        </div>
    </div>

    <script>
        const flashcardsData = [
            {
                category: "Overview",
                question: "What are the 3 core functions of banks?",
                answer: "<ul><li><strong>Lending</strong> — granting loans and mortgages</li><li><strong>Deposits</strong> — accepting savings and checking deposits</li><li><strong>Payment Processing</strong> — maintaining accounts and executing transfers</li></ul>"
            },
            {
                category: "Overview",
                question: "What other financial institutions exist besides banks?",
                answer: "<ul><li><strong>Insurance</strong> — risk management</li><li><strong>Investment funds</strong> — issue bonds, mutual funds, ETFs</li><li><strong>Pension funds</strong> — private retirement savings</li><li><strong>Shadow banks</strong> — private equity (off-exchange)</li><li><strong>Fintechs</strong> — digital/mobile financial services</li></ul>"
            },
            {
                category: "Macroeconomics",
                question: "What are the 3 macroeconomic functions of banks?",
                answer: "<ul><li><strong>Aggregation</strong> — pool many small deposits to grant large loans</li><li><strong>Maturity extension</strong> — short-term deposits → long-term loans</li><li><strong>Safe haven / Risk transformation</strong> — savers trust money is safe; bank assumes credit risk</li></ul>"
            },
            {
                category: "Macroeconomics",
                question: "What is a bank run and how is it prevented?",
                answer: "<ul><li><strong>Bank run</strong> = loss of confidence → all savers withdraw simultaneously</li><li>Prevention: <strong>Minimum capital requirements</strong> for banks</li><li><strong>Deposit insurance</strong> — pays up to €100,000 per depositor per bank (EU/EEA)</li><li>US equivalent: <strong>FDIC</strong> up to $250,000</li></ul>"
            },
            {
                category: "Institutions",
                question: "What are the 3 key financial stability institutions in Austria/EU?",
                answer: "<ul><li><strong>ECB</strong> (European Central Bank) — supervises 114 largest EURO-area banks, runs stress tests</li><li><strong>OeNB</strong> (Austrian National Bank) — supervises smaller Austrian banks</li><li><strong>FMA</strong> (Financial Market Authority) — issues banking licenses, supervises insurances/pension funds, dissolves bankrupt banks</li></ul>"
            },
            {
                category: "Banking Act",
                question: "Name 5 banking services under the Austrian Banking Act (BWG)",
                answer: "<ul><li><strong>Einlagengeschäft</strong> — Deposit-taking</li><li><strong>Kreditgeschäft</strong> — Lending</li><li><strong>Kontokorrentgeschäft</strong> — Checking accounts</li><li><strong>Diskontgeschäft</strong> — Discounting bills</li><li><strong>Garantiegeschäft</strong> — Guarantees</li><li><strong>Depotgeschäft</strong> — Custody</li><li><strong>Zahlungsgeschäft</strong> — Payment services</li><li><strong>Factoring</strong> — Buying receivables</li></ul>"
            },
            {
                category: "Banking Act",
                question: "What is the difference between Futures and Options?",
                answer: "<ul><li><strong>Future</strong>: Contract to buy/sell at set price on set date — <strong>both parties obligated</strong> → unlimited gains AND losses</li><li><strong>Option</strong>: Gives the <strong>right but not obligation</strong> to buy/sell — one party can opt out → <strong>loss limited to premium</strong></li><li><strong>Call option</strong> = right to buy (profit from rising market)</li><li><strong>Put option</strong> = right to sell (profit from falling market)</li></ul>"
            },
            {
                category: "Bonds",
                question: "What are the key terms of a bond?",
                answer: "<ul><li><strong>Issuer</strong> — borrower (government, corporation)</li><li><strong>Face Value</strong> — amount repaid at maturity (typically €1,000)</li><li><strong>Coupon Rate</strong> — interest rate paid annually/semi-annually</li><li><strong>Maturity Date</strong> — when principal is due</li><li><strong>Yield</strong> — effective return based on current price</li><li><strong>Market Price</strong> — trades above/below face value depending on interest rates</li></ul>"
            },
            {
                category: "Bonds",
                question: "What are the 5 common types of bonds?",
                answer: "<ul><li><strong>Treasury/Government bonds</strong> — safest (e.g., German 'Bund')</li><li><strong>Corporate bonds</strong> — higher risk, higher yield</li><li><strong>Municipal bonds</strong> — often tax-free for local investors</li><li><strong>Zero-coupon bonds</strong> — sold at discount, no periodic interest</li><li><strong>Convertible bonds</strong> — can convert to company shares</li></ul>"
            },
            {
                category: "Bonds",
                question: "What are the pros and cons of investing in bonds?",
                answer: "<ul><li><strong>Pros:</strong> Stable income (predictable coupons), Capital preservation (face value at maturity), Diversification (less volatile than stocks), Tax benefits (municipal bonds)</li><li><strong>Cons:</strong> Interest Rate Risk (prices fall when rates rise), Credit Risk (issuer may default), Inflation Risk (erodes fixed payments)</li></ul>"
            },
            {
                category: "Instruments",
                question: "What is a Bill of Exchange (Wechsel)?",
                answer: "<ul><li><strong>Written, signed, unconditional</strong> order to pay a specific amount</li><li>From <strong>drawer</strong> to <strong>drawee</strong> to <strong>payee</strong></li><li>Payable at fixed future date or on demand</li><li><strong>Enforceable quickly</strong> through court (no defenses based on underlying transaction)</li><li>Can be <strong>discounted by banks</strong> for early cash</li></ul>"
            },
            {
                category: "Austria",
                question: "What are the 6 banking sectors in Austria?",
                answer: "<ul><li><strong>Aktienbanken</strong> (BAWAG) — publicly traded universal banks</li><li><strong>Sparkassen</strong> (Erste Bank) — historically municipality-owned</li><li><strong>Raiffeisenbanken</strong> — historically farmer cooperatives</li><li><strong>Volksbanken</strong> — historically farmer cooperatives</li><li><strong>Hypobanken</strong> — state-owned, housing subsidies</li><li><strong>Bausparkassen</strong> (Wüstenrot) — savings for home ownership</li></ul>"
            },
            {
                category: "Types",
                question: "What is the difference between Universal and Specialized banks?",
                answer: "<ul><li><strong>Universal banks</strong> — all conventional transactions (retail + commercial): checking, savings, loans, securities</li><li><strong>Specialized banks</strong> — only certain transactions: Bausparkassen (mortgages), investment companies (mutual funds), credit card companies, Österreichische Kontrollbank (export guarantees)</li><li><strong>Central banks</strong> (OeNB, ECB) — macroeconomic tasks: set interest rates, issue banknotes, ensure liquidity</li></ul>"
            },
            {
                category: "Business Model",
                question: "How do banks make money? Explain the balance sheet.",
                answer: "<ul><li><strong>Core model</strong>: Accept deposits (pay low interest) → Grant loans (charge higher interest) = Interest margin</li><li><strong>Assets (Active)</strong>: Loans to customers, non-current assets, other current assets</li><li><strong>Liabilities & Equity (Passive)</strong>: Customer deposits, owner's capital, other liabilities</li><li><strong>PnL</strong>: Interest Income − Interest Expenses = Net Interest Income + Fees + Trading − Expenses = Profit</li></ul>"
            },
            {
                category: "Loans",
                question: "Compare Overdraft, Consumer Credit, and Mortgage loans",
                answer: "<table><tr><th>Type</th><th>Term</th><th>Interest</th><th>Collateral</th></tr><tr><td>Overdraft</td><td>2-3 months</td><td>Very high (9-15%)</td><td>None</td></tr><tr><td>Consumer Credit</td><td>Up to 10 years</td><td>High (8-10%)</td><td>Guarantor/collateral</td></tr><tr><td>Mortgage</td><td>Up to 25 years</td><td>Low (3-6%)</td><td>Home/land</td></tr></table>"
            },
            {
                category: "Loans",
                question: "What are the 3 types of loan repayment structures?",
                answer: "<ul><li><strong>Amortizing loans</strong> — equal periodic payments (principal + interest), e.g., mortgages, investment loans</li><li><strong>Interest-only loans</strong> — pay interest only; entire principal at maturity, e.g., property loans</li><li><strong>Revolving credit</strong> — draw/repay repeatedly within limit, e.g., overdraft, credit lines</li></ul>"
            },
            {
                category: "Deposits",
                question: "What are the 3 types of customer deposits?",
                answer: "<ul><li><strong>Daily/Demand deposits</strong> (Sichteinlagen) — no fixed term, checking/savings accounts</li><li><strong>Term/Time deposits</strong> — fixed terms from 6 months to 5 years</li><li><strong>Securities deposits</strong> — cash bonds, long-term bonds (1-30 years), primarily for businesses</li></ul>"
            },
            {
                category: "Loans",
                question: "What fees are typically included in loan agreements?",
                answer: "<ul><li><strong>Arrangement fee</strong> — one-time, 0.5-2% of loan (deducted upfront or added)</li><li><strong>Account management fee</strong> — monthly (€8-12)</li><li><strong>Collateral monitoring fee</strong> — checking collateral value</li><li><strong>Risk/provision fee</strong> — for credit risk coverage</li><li><strong>Insurance premium</strong> — linked payment protection/life insurance</li></ul>"
            },
            {
                category: "Interest",
                question: "How is a variable interest rate calculated?",
                answer: "<ul><li><strong>Variable Rate = Base Rate + Margin</strong></li><li><strong>Base rate</strong> — short-term benchmark (e.g., 3M EURIBOR, SOFR)</li><li><strong>Margin</strong> — fixed addition covering risk, costs, and profit</li><li><strong>3M EURIBOR</strong> is most common for mortgages</li><li><strong>Example</strong>: 3M EURIBOR (3.70%) + 1.5% margin = 5.20% → rounded to 5.25%</li></ul>"
            },
            {
                category: "Interest",
                question: "What is the difference between Nominal Rate and APR?",
                answer: "<ul><li><strong>Nominal Rate</strong> — interest only, used in advertising (looks lower)</li><li><strong>APR (Annual Percentage Rate / Effective Rate)</strong> — includes ALL costs: interest + arrangement fees + appraisal + notary + account fees + early repayment penalties</li><li>APR is the <strong>true cost of borrowing</strong> — always higher than nominal</li></ul>"
            },
            {

        class FlashcardApp {
            constructor() {
                this.cards = flashcardsData;
                this.currentIndex = 0;
                this.filteredCards = [...this.cards];
                this.markedCards = new Set();
                this.isFlipped = false;
                this.currentCategory = 'all';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.setupCategoryFilter();
                this.updateDisplay();
                this.updateStats();
            }

            setupCategoryFilter() {
                const categories = ['all', ...new Set(this.cards.map(c => c.category))];
                const filterContainer = document.getElementById('category-filter');
                filterContainer.innerHTML = categories.map(cat => 
                    '<button class="filter-btn ' + (cat === 'all' ? 'active' : '') + '" data-category="' + cat + '">' + cat + '</button>'
                ).join('');

                const self = this;
                filterContainer.querySelectorAll('.filter-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        const category = e.target.dataset.category;
                        self.filterCategory(category);
                        filterContainer.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                        e.target.classList.add('active');
                    });
                });
            }

            filterCategory(category) {
                this.currentCategory = category;
                this.filteredCards = category === 'all' 
                    ? [...this.cards] 
                    : this.cards.filter(function(c) { return c.category === category; });
                this.currentIndex = 0;
                this.isFlipped = false;
                this.updateDisplay();
                this.updateStats();
            }

            setupEventListeners() {
                const self = this;

                // Card flip
                document.getElementById('card-container').addEventListener('click', function(e) {
                    if (!e.target.closest('.star-btn')) {
                        self.flip();
                    }
                });

                // Star button
                document.getElementById('star-btn').addEventListener('click', function(e) {
                    e.stopPropagation();
                    self.toggleMark();
                });

                // Navigation
                document.getElementById('prev-btn').addEventListener('click', function() { self.prev(); });
                document.getElementById('difficult-btn').addEventListener('click', function() { self.markAndNext(); });
                document.getElementById('easy-btn').addEventListener('click', function() { self.next(); });
                document.getElementById('restart-btn').addEventListener('click', function() { self.restart(); });

                // Keyboard
                document.addEventListener('keydown', function(e) {
                    switch(e.key) {
                        case ' ':
                        case 'ArrowUp':
                        case 'ArrowDown':
                            e.preventDefault();
                            self.flip();
                            break;
                        case 'ArrowLeft':
                            self.prev();
                            break;
                        case 'ArrowRight':
                            self.next();
                            break;
                        case 'm':
                        case 'M':
                            self.toggleMark();
                            break;
                        case '1':
                            self.markAndNext();
                            break;
                        case '2':
                            self.next();
                            break;
                    }
                });
            }

            flip() {
                this.isFlipped = !this.isFlipped;
                const card = document.getElementById('card');
                if (this.isFlipped) {
                    card.classList.add('flipped');
                } else {
                    card.classList.remove('flipped');
                }
            }

            next() {
                if (this.currentIndex < this.filteredCards.length - 1) {
                    this.currentIndex++;
                    this.isFlipped = false;
                    this.updateDisplay();
                } else {
                    this.showCompletion();
                }
            }

            prev() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.isFlipped = false;
                    this.updateDisplay();
                }
            }

            toggleMark() {
                const card = this.filteredCards[this.currentIndex];
                const originalIndex = this.cards.indexOf(card);

                if (this.markedCards.has(originalIndex)) {
                    this.markedCards.delete(originalIndex);
                } else {
                    this.markedCards.add(originalIndex);
                }

                this.updateStarButton();
                this.updateStats();
            }

            markAndNext() {
                const card = this.filteredCards[this.currentIndex];
                const originalIndex = this.cards.indexOf(card);
                this.markedCards.add(originalIndex);
                this.updateStarButton();
                this.updateStats();
                this.next();
            }

            updateDisplay() {
                const card = this.filteredCards[this.currentIndex];
                const originalIndex = this.cards.indexOf(card);

                document.getElementById('front-category').textContent = card.category;
                document.getElementById('back-category').textContent = card.category;
                document.getElementById('front-number').textContent = (this.currentIndex + 1) + '/' + this.filteredCards.length;
                document.getElementById('card-question').textContent = card.question;
                document.getElementById('card-answer').innerHTML = card.answer;

                const cardEl = document.getElementById('card');
                if (this.isFlipped) {
                    cardEl.classList.add('flipped');
                } else {
                    cardEl.classList.remove('flipped');
                }

                this.updateStarButton();
                this.updateProgress();
                this.updateNavButtons();
            }

            updateStarButton() {
                const card = this.filteredCards[this.currentIndex];
                const originalIndex = this.cards.indexOf(card);
                const btn = document.getElementById('star-btn');
                if (this.markedCards.has(originalIndex)) {
                    btn.classList.add('marked');
                } else {
                    btn.classList.remove('marked');
                }
            }

            updateStats() {
                document.getElementById('current-card').textContent = (this.currentIndex + 1).toString();
                document.getElementById('total-cards').textContent = this.filteredCards.length.toString();
                document.getElementById('marked-count').textContent = this.markedCards.size.toString();
            }

            updateProgress() {
                const percent = ((this.currentIndex + 1) / this.filteredCards.length) * 100;
                document.getElementById('progress-fill').style.width = percent + '%';
            }

            updateNavButtons() {
                document.getElementById('prev-btn').disabled = this.currentIndex === 0;
            }

            showCompletion() {
                document.getElementById('card-container').style.display = 'none';
                document.getElementById('controls').style.display = 'none';
                document.querySelector('.keyboard-hints').style.display = 'none';
                document.getElementById('completion-screen').classList.add('active');

                document.getElementById('completed-total').textContent = this.filteredCards.length.toString();
                document.getElementById('completed-marked').textContent = this.markedCards.size.toString();
                document.getElementById('completed-percent').textContent = '100%';

                if (this.markedCards.size > 0) {
                    const markedList = Array.from(this.markedCards).map(function(i) {
                        return flashcardsData[i].question.substring(0, 50) + '...';
                    }).join('<br>');
                    document.getElementById('difficult-summary').innerHTML = '<strong>Difficult cards to review:</strong><br><small>' + markedList + '</small>';
                }
            }

            restart() {
                this.currentIndex = 0;
                this.isFlipped = false;

                document.getElementById('card-container').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                document.querySelector('.keyboard-hints').style.display = 'flex';
                document.getElementById('completion-screen').classList.remove('active');

                this.updateDisplay();
                this.updateStats();
            }
        }

        // Initialize app
        const app = new FlashcardApp();
    </script>
